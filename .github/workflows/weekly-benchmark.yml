name: Weekly Benchmark

on:
  schedule:
    # Every Monday at 08:00 UTC
    - cron: '0 8 * * 1'
  workflow_dispatch:  # allow manual runs

permissions:
  contents: write

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install claudectx from npm
        run: npm install -g claudectx

      - name: Run analysis on this repo
        id: analyze
        run: |
          claudectx analyze --json --path . > /tmp/analyze.json || true
          cat /tmp/analyze.json

      - name: Run report (7 days)
        run: |
          claudectx report --json --days 7 > /tmp/report.json || true

      - name: Write benchmark snapshot
        run: |
          DATE=$(date -u +%Y-%m-%d)
          mkdir -p benchmarks
          cp /tmp/analyze.json benchmarks/${DATE}-analyze.json || echo '{}' > benchmarks/${DATE}-analyze.json
          cp /tmp/report.json benchmarks/${DATE}-report.json || echo '{}' > benchmarks/${DATE}-report.json

          # Keep only the 12 most recent snapshots (3 months)
          ls -t benchmarks/*-analyze.json 2>/dev/null | tail -n +13 | xargs rm -f || true
          ls -t benchmarks/*-report.json 2>/dev/null | tail -n +13 | xargs rm -f || true

      - name: Update BENCHMARK.md summary
        run: |
          DATE=$(date -u +%Y-%m-%d)
          ANALYZE=$(cat /tmp/analyze.json 2>/dev/null || echo '{}')
          TOKENS=$(echo "$ANALYZE" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('totalTokensPerRequest', 'N/A'))" 2>/dev/null || echo 'N/A')
          COST=$(echo "$ANALYZE" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('estimatedCostPerSession', 'N/A'))" 2>/dev/null || echo 'N/A')

          cat > BENCHMARK.md << EOF
          # claudectx Self-Benchmark

          > Auto-generated by the [weekly-benchmark](.github/workflows/weekly-benchmark.yml) workflow.
          > claudectx analyzing itself — eating its own dogfood.

          **Last run:** ${DATE}

          ## Latest Analysis (claudectx repo)

          | Metric | Value |
          |--------|-------|
          | Tokens / request | ${TOKENS} |
          | Est. cost / session | ${COST} |
          | Snapshot | [${DATE}](benchmarks/${DATE}-analyze.json) |

          ## Historical snapshots

          $(ls benchmarks/*-analyze.json 2>/dev/null | sort -r | head -12 | while read f; do
            d=$(basename "$f" -analyze.json)
            echo "- [${d}](${f})"
          done)
          EOF

      - name: Commit and push results
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "[AUTO] Weekly benchmark snapshot ${{ steps.date.outputs.date }}"
          file_pattern: "benchmarks/ BENCHMARK.md"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
